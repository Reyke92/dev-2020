<html>
<head>
  <title>WKU Information Chatbot</title>

  <script src="ts/app.ts"></script>
  <link href="scss/style.scss" rel="stylesheet"/>
</head>

<body>
  <div class="fullscreen">
    <div class="navbar">
      WKU Information Chatbot
    </div>

    <div class="appWindow">
      <button id="changeTopicButton" type="submit" disabled="disabled">Change Topic</button>
      <hr style="width: 100%;">
      <div id="messageList"></div>
      <div class="bottomBar">
        <input id="messageBox" type="text" placeholder="Let's Chat!" maxlength="120" disabled="disabled"></input>
        <button id="sendButton" type="submit" disabled="disabled">Send</button>
      </div>
    </div>
  </div>

</body>
</html>
